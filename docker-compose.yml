version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: insightbi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: insightbi
      POSTGRES_PASSWORD: insightbi_secret
      POSTGRES_DB: insightbi
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: insightbi_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: insightbi_server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://insightbi:insightbi_secret@postgres:5432/insightbi
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super_secret_jwt_key_change_in_production
      NODE_ENV: development
      PORT: 4000
    ports:
      - '4000:4000'
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: insightbi_client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - '3000:3000'
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  uploads:
